<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<button onclick="requestApi()">Request</button>

<input type="text" id="resultado" style="width:400px;" />

<script>
function requestApi() {
  fetch('https://localhost:7218/GetAll')
    .then(res => res.json())
    .then(data => {
      const c = data.value[0];
      document.getElementById('resultado').value =
        `ID: ${c.id} | Nome: ${c.clientName} | Quarto: ${c.roomNumber}`;
    });
}
</script>

</body>
</html>
